    <rect x="750" y="220" width="120" height="410"/>
    <rect x="890" y="340" width="70" height="290"/>
    <rect x="980" y="280" width="100" height="350"/>
  </g>
  
  <!-- Window dots on buildings -->
  <g fill="#ffffff" opacity="0.3">
