    <rect x="220" y="370" width="15" height="15" rx="2"/>
    <rect x="250" y="370" width="15" height="15" rx="2"/>
    <rect x="220" y="400" width="15" height="15" rx="2"/>
    <rect x="250" y="400" width="15" height="15" rx="2"/>
    <rect x="770" y="240" width="15" height="15" rx="2"/>
    <rect x="800" y="240" width="15" height="15" rx="2"/>
    <rect x="830" y="240" width="15" height="15" rx="2"/>
    <rect x="770" y="270" width="15" height="15" rx="2"/>
    <rect x="800" y="270" width="15" height="15" rx="2"/>
    <rect x="830" y="270" width="15" height="15" rx="2"/>
