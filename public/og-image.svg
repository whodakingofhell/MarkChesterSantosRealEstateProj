  </text>
  
  <!-- Divider -->
  <line x1="350" y1="530" x2="850" y2="530" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
  
  <!-- Contact info -->
  <text x="600" y="565" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#bae6fd">
