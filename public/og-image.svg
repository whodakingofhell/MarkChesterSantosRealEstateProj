    <rect x="150" y="400" width="15" height="15" rx="2"/>
    <rect x="120" y="430" width="15" height="15" rx="2"/>
    <rect x="150" y="430" width="15" height="15" rx="2"/>
    <rect x="120" y="460" width="15" height="15" rx="2"/>
